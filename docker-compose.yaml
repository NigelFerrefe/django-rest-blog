services:
  # Django app
  backend:
    container_name: django
    build: .
    command: uvicorn core.asgi:application --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - ./secrets/gcs-credentials.json:/app/secrets/gcs-credentials.json
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gcs-credentials.json
    ports:
      - 8000:8000
    depends_on:
      django_db:
        condition: service_healthy
      django_redis:
        condition: service_started

  # Redis
  django_redis:
    image: redis
    container_name: django_redis
    ports:
      - 6379:6379

  # DB
  django_db:
    image: postgres
    container_name: postgresql
    restart: always
    environment:
      POSTGRES_DB: django_db
      POSTGRES_USER: django
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - .dbdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U django -d django_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Celery
  celery_worker:
    container_name: blog_celery_worker
    build: .
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
      - ./secrets/gcs-credentials.json:/app/secrets/gcs-credentials.json
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gcs-credentials.json
    ports:
      - 8001:8001
    depends_on:
      django_db:
        condition: service_healthy
      django_redis:
        condition: service_started

  # Celery beat
  celery_beat:
    container_name: blog_celery_beat
    build: .
    command: celery -A core beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
      - ./secrets/gcs-credentials.json:/app/secrets/gcs-credentials.json
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gcs-credentials.json
    ports:
      - 8002:8002
    depends_on:
      django_db:
        condition: service_healthy
      django_redis:
        condition: service_started